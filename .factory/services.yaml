commands:
  install: cd frontend && npm install
  typecheck: cd frontend && npm run build
  build: cd frontend && npm run build
  lint: cd frontend && npm run lint
  test: echo "No test suite configured"

services:
  backend:
    start: cd /Users/janishahn/Documents/PythonProjects/ddf && uv run uvicorn main:app --reload --port 8000 --host 127.0.0.1
    stop: lsof -ti :8000 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:8000/api/healthz
    port: 8000
    depends_on: []

  frontend:
    start: cd /Users/janishahn/Documents/PythonProjects/ddf/frontend && npm run dev -- --port 3000
    stop: lsof -ti :3000 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3000
    port: 3000
    depends_on: [backend]
